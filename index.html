<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warrior 8-Direction Prototype</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        /* Full-screen black stage */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0d0d;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            image-rendering: pixelated;
        }

        /* Forçar nearest-neighbor no canvas do Phaser quando escalonado via CSS */
        canvas {
            image-rendering: pixelated;
            /* Chrome, Edge, Opera */
            image-rendering: crisp-edges;
            /* Firefox */
            image-rendering: -moz-crisp-edges;
            /* Firefox old */
        }

        /* Single scale wrapper — everything lives here at fixed base size */
        #scale-root {
            position: absolute;
            width: 1320px;
            height: 680px;
            transform-origin: top left;
            overflow: hidden;
            /* needed for fill/cover mode to crop edges cleanly */
            /* JS will set transform: scale() and left/top to center it */
        }

        /* Utils for pixel art borders using box-shadow to simulate thickness without blurring */
        .pixel-border {
            box-shadow:
                -4px 0 0 0 #000,
                4px 0 0 0 #000,
                0 -4px 0 0 #000,
                0 4px 0 0 #000;
            margin: 4px;
            /* Space for the shadow border */
        }

        .pixel-border-inset {
            box-shadow: inset 2px 2px 0px 0px #00000050, inset -2px -2px 0px 0px #ffffff20;
        }

        #ui-wrapper {
            background-color: #130e07;
            padding: 40px;
            display: flex;
            gap: 24px;
            align-items: center;
            box-shadow: 0 0 100px rgba(0, 0, 0, 1);
            /* transform:scale(0.8) is applied via JS only after game starts */
        }

        /* Shared Panel Style */
        .retro-panel {
            background-color: #2b1d1a;
            /* Dark Brown Panel */
            border: 4px solid #4a4a4a;
            /* Dark Grey Border */
            position: relative;
            box-shadow: inset 0 0 30px #000;
        }

        /* Outer black border for panels */
        .retro-panel::after {
            content: "";
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border: 2px solid #000;
            pointer-events: none;
            z-index: 10;
        }

        /* LEFT SIDEBAR - Character & Stats */
        #status-sidebar {
            width: 192px;
            /* height: 600px;  REMOVED fixed height to prevent squashing */
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            color: #dcdcdc;
        }

        .profile-section {
            width: 100%;
            aspect-ratio: 128 / 100;
            flex-shrink: 0;
            /* DON'T SQUASH ME */
            background-color: #111;
            border: 4px solid #5d4037;
            /* Wood/Frame color */
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: inset 0 0 10px #000;
            position: relative;
        }

        .profile-section::before {
            /*content: "PORTRAIT";*/
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 8px;
            opacity: 0.3;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            background-image: url('Asset/UI/expressions_Player.png');
            background-size: 300% 200%;
            image-rendering: pixelated;
        }

        /* Expressions: Percentages avoid bleed on scaling */
        .profile-img.base {
            background-position: 0% 0%;
        }

        .profile-img.low-hp {
            background-position: 50% 0%;
        }

        .profile-img.action {
            background-position: 100% 0%;
        }

        .profile-img.pickup {
            background-position: 0% 100%;
        }

        .profile-img.hurt {
            background-position: 50% 100%;
        }

        .profile-img.dead {
            background-position: 100% 100%;
        }

        .status-bar-container {
            margin-bottom: 15px;
            width: 100%;
        }

        .status-label {
            font-size: 10px;
            margin-bottom: 8px;
            color: #aaa;
            text-transform: uppercase;
            text-shadow: 2px 2px #000;
        }

        .bar-bg {
            width: 100%;
            height: 24px;
            background-color: #111;
            border: 2px solid #000;
            position: relative;
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.8);
        }

        .bar-fill {
            height: 100%;
        }

        /* Retro Gradients for bars */
        .bar-fill.health {
            background: linear-gradient(to bottom, #ff5252, #b71c1c);
            border-right: 2px solid #ff8a80;
            /* Highlight */
        }

        .bar-fill.stamina {
            background: linear-gradient(to bottom, #69f0ae, #1b5e20);
            border-right: 2px solid #b9f6ca;
        }

        .bar-fill.ready {
            background: linear-gradient(to bottom, #ffd740, #ff6f00);
            border-right: 2px solid #ffecb3;
        }

        .bar-fill.charging {
            background: linear-gradient(to bottom, #ff6f00, #e65100);
        }

        .health-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 2px;
            line-height: 20px;
            font-size: 10px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }

        /* CENTER - Game */
        #game-container {
            /* Inherits retro-panel styles */
            display: block;
            width: 800px;
            height: 600px;
            /* box-sizing: content-box (default) so border adds outside, making all 4 borders visible */
            flex-shrink: 0;
        }

        /* RIGHT SIDEBAR - Inventory */
        #inventory-sidebar {
            width: 192px;
            height: 600px;
            padding: 0 15px;
            /* Removed top/bottom padding to let flex center it */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            /* Vertical alignment center */
            align-items: center;
            color: #d7ccc8;
        }

        #inventory-sidebar h3 {
            margin: 0 0 20px 0;
            font-size: 14px;
            color: #deb887;
            text-shadow: 2px 2px 0 #000;
            border-bottom: 4px solid #281a16;
            width: 100%;
            text-align: center;
            padding-bottom: 10px;
        }

        .backpack-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            padding: 0;
            margin-top: 10px;
        }

        .inventory-slot {
            width: 100%;
            aspect-ratio: 1 / 1;
            /* Force square slots */
            background-color: #1a100d;
            border: 2px solid #5d4037;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 0 10px #000;
            image-rendering: pixelated;
            box-sizing: border-box;
        }

        /* Slot hover effect */
        .inventory-slot:hover {
            background-color: #2d1c18;
            border-color: #8d6e63;
        }

        .inventory-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .inventory-icon img {
            max-width: 50px;
            max-height: 50px;
            object-fit: contain;
            image-rendering: pixelated;
            filter: drop-shadow(2px 2px 0 #000);
        }

        .item-count {
            font-size: 10px;
            color: #ffd700;
            position: absolute;
            bottom: 4px;
            right: 4px;
            text-shadow: 2px 2px 0 #000;
        }

        .inventory-slot.empty .inventory-icon,
        .inventory-slot.empty .item-count {
            visibility: hidden;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        /* Volume Settings Styles for Pause Menu */
        #pause-settings-ui {
            position: absolute;
            left: 50%;
            top: 450px;
            /* Reduced gap from controls list */
            transform: translateX(-50%);
            z-index: 200001;
            width: 500px;
            /* Wider for side-by-side */
            pointer-events: all;
        }

        .settings-container {
            padding: 25px 10px 5px 10px;
            /* Increased top padding to separate from line */
            background: none;
            border-top: 2px solid #ffffff;
            /* Solid white separator */
            width: 100%;
            display: flex;
            justify-content: space-between;
            gap: 40px;
        }

        .volume-control {
            flex: 1;
            margin-bottom: 0;
        }

        .volume-control label {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            /* Increased font size */
            color: #ffd700;
            /* Keeping yellow for parity with title */
            display: block;
            margin-bottom: 12px;
            text-transform: uppercase;
            text-align: center;
        }

        .range-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 10px;
            background: #111;
            border: 2px solid #000;
            outline: none;
            box-shadow: inset 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #ffffff;
            /* White handle */
            cursor: pointer;
            border: 2px solid #000;
        }

        .range-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #ffffff;
            /* White handle */
            cursor: pointer;
            border: 2px solid #000;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.0/dist/phaser.min.js"></script>
    <script src="src/Player/Player.js"></script>
    <script src="src/Itens/Item.js"></script>
    <script src="src/Monsters/Enemy.js"></script>
    <script src="src/Monsters/RangedEnemy.js"></script>
    <script src="src/Monsters/SkeletonEnemy.js"></script>
    <script src="src/Monsters/SkullBugEnemy.js"></script>
    <script src="src/Monsters/VamBatEnemy.js"></script>
    <script src="src/Monsters/LichKing.js"></script>
    <script src="src/Map/Wall.js"></script>
    <script src="src/Map/Door.js"></script>
    <script src="src/Itens/Chest.js"></script>
    <script src="src/Map/Trap.js"></script>
    <script src="src/Map/Rock.js"></script>
    <script src="src/Map/HoldingTrap.js"></script>
    <script src="src/Map/HazardObject.js"></script>
    <script src="src/Map/Portal.js"></script>
    <script src="src/Map/Rune.js"></script>
    <script src="src/Map/LevelData.js"></script>
    <script src="src/Map/Levels/level_2.js"></script>
    <!-- Mapas Tiled exportados do MapManager (gerados via "🗺 Exportar Tiled JS") -->
    <!-- Exporte cada nivel e salve em Levels/ com o nome exato abaixo -->

    <script src="src/Map/Levels/level_1.js"></script>
    <script src="src/Game/StartScene.js"></script>
    <script src="src/Game/game.js"></script>
</head>

<body>
    <!-- Global Overlay for HTML + Game Fade Transitions -->
    <div id="global-fade-overlay"></div>

    <!-- Single scale root: all game HTML lives here, scaled as a unit -->
    <div id="scale-root">
        <div id="ui-wrapper">
            <div id="status-sidebar" class="retro-panel">
                <div class="profile-section">
                    <div class="profile-img base" id="player-profile-img"></div>
                </div>

                <div class="status-bar-container">
                    <div class="status-label">Health</div>
                    <div class="bar-bg">
                        <div class="bar-fill health" id="bar-health" style="width: 100%;"></div>
                        <div class="health-text" id="text-health">100/100</div>
                    </div>
                </div>

                <div class="status-bar-container">
                    <div class="status-label">Stamina</div>
                    <div class="bar-bg">
                        <div class="bar-fill stamina" id="bar-stamina" style="width: 100%;"></div>
                        <div class="health-text" id="text-stamina">50/50</div>
                    </div>
                </div>

                <!-- Cooldown Bars -->
                <div class="status-bar-container">
                    <div class="status-label">Jump Kick</div>
                    <div class="bar-bg">
                        <div class="bar-fill ready" id="bar-kick" style="width: 100%;"></div>
                    </div>
                </div>

                <div class="status-bar-container">
                    <div class="status-label">Ground Dash</div>
                    <div class="bar-bg">
                        <div class="bar-fill ready" id="bar-dash" style="width: 100%;"></div>
                    </div>
                </div>

                <div class="status-bar-container">
                    <div class="status-label">Roar</div>
                    <div class="bar-bg">
                        <div class="bar-fill ready" id="bar-roar" style="width: 100%;"></div>
                    </div>
                </div>

                <div class="status-bar-container">
                    <div class="status-label">Ground Pound</div>
                    <div class="bar-bg">
                        <div class="bar-fill ready" id="bar-pound" style="width: 100%;"></div>
                    </div>
                </div>

                <div class="status-bar-container">
                    <div class="status-label">Energy Shield</div>
                    <div class="bar-bg">
                        <div class="bar-fill ready" id="bar-shield" style="width: 100%;"></div>
                    </div>
                </div>

            </div>
            <div id="game-container" class="retro-panel">
                <!-- Pause Volume Overlay -->
                <div id="pause-settings-ui" style="display: none;">
                    <div class="settings-container">
                        <div class="volume-control">
                            <label>Ambient Volume</label>
                            <input type="range" min="0" max="100" value="40" class="range-slider" id="slider-ambient">
                        </div>
                        <div class="volume-control">
                            <label>SFX Volume</label>
                            <input type="range" min="0" max="100" value="60" class="range-slider" id="slider-sfx">
                        </div>
                    </div>
                </div>
            </div>
            <div id="inventory-sidebar" class="retro-panel">
                <h3
                    style="text-align: center; border-bottom: 2px solid #3e2723; padding-bottom: 10px; margin-bottom: 0;">
                    BACKPACK
                </h3>

                <div class="backpack-grid" id="backpack-grid">
                    <!-- 10 Generic Slots -->
                    <div class="inventory-slot empty" id="slot-0"></div>
                    <div class="inventory-slot empty" id="slot-1"></div>
                    <div class="inventory-slot empty" id="slot-2"></div>
                    <div class="inventory-slot empty" id="slot-3"></div>
                    <div class="inventory-slot empty" id="slot-4"></div>
                    <div class="inventory-slot empty" id="slot-5"></div>
                    <div class="inventory-slot empty" id="slot-6"></div>
                    <div class="inventory-slot empty" id="slot-7"></div>
                    <div class="inventory-slot empty" id="slot-8"></div>
                    <div class="inventory-slot empty" id="slot-9"></div>
                </div>
            </div>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen">
            <div class="loading-text">LOADING...</div>
        </div>

        <!-- Click to Start Screen -->
        <div id="click-to-start-screen" style="display: none;">
            <div class="click-to-start-text">CLICK TO START</div>
        </div>

        <!-- Start Menu -->
        <div id="start-menu">
            <div class="menu-content">
                <img src="Asset/UI/Logo.png" class="logo" alt="Ultimate Resurrection Warrior">
                <button id="start-btn">
                    <img src="Asset/UI/button_Start.png" alt="START GAME">
                </button>
            </div>
        </div>
    </div><!-- /#scale-root -->

    <style>
        /* Overlay Styles */
        /* Overlays: absolute inside #scale-root, same base dimensions */
        #loading-screen,
        #start-menu,
        #click-to-start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 1320px;
            height: 680px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background-color: #0d0d0d;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Loading specific */
        #loading-screen {
            color: #fff;
            font-size: 24px;
            letter-spacing: 4px;
        }

        .loading-text {
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Start Menu specific */
        #start-menu {
            background-color: transparent;
            background-repeat: no-repeat;
            align-items: flex-start;
            padding-left: 10%;
            display: none;
        }

        #click-to-start-screen {
            background-color: #0d0d0d;
            /* Keep screen black after loading */
            cursor: pointer;
            z-index: 1001;
            /* Above loading screen */
        }

        .click-to-start-text {
            color: #fff;
            font-size: 16px;
            letter-spacing: 2px;
            animation: blink-text 1s infinite;
            text-shadow: 2px 2px #000;
            font-family: 'Press Start 2P', cursive;
        }

        @keyframes blink-text {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .menu-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Center logo and button relative to each other */
        }

        #start-menu .logo {
            width: 450px;
            height: auto;
            margin-bottom: 35px;
            image-rendering: pixelated;
        }

        #start-btn {
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            margin-bottom: 55px;
            cursor: pointer;
            transition: transform 0.1s;
            outline: none;
        }

        #start-btn img {
            width: 250px;
            height: auto;
            image-rendering: pixelated;
            display: block;
        }

        #start-btn:hover {
            transform: scale(1.05);
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        /* Global Fade Overlay */
        #global-fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 999999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        #global-fade-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
    </style>

    <script>
        // Responsive scale wrapper — supports two modes:
        //   FILL (cover)   → Math.max: fills screen, no black bars, slight crop at edges
        //   CONTAIN        → Math.min: no crop, may have black bars (used during gameplay)
        (function () {
            const BASE_W = 1320, BASE_H = 680;
            let fillMode = true; // Start in fill mode for the start screen

            function scaleGame() {
                const scaleX = window.innerWidth / BASE_W;
                const scaleY = window.innerHeight / BASE_H;
                // Arredondar para múltiplo de 0.25 evita sub-pixel rendering que causa blur
                const rawScale = fillMode ? Math.max(scaleX, scaleY) : Math.min(scaleX, scaleY);
                const scale = Math.round(rawScale * 4) / 4;
                const root = document.getElementById('scale-root');
                if (!root) return;
                root.style.transform = 'scale(' + scale + ')';
                root.style.left = Math.round((window.innerWidth - BASE_W * scale) / 2) + 'px';
                root.style.top = Math.round((window.innerHeight - BASE_H * scale) / 2) + 'px';
            }

            // Fill mode: start screen fills the window completely (no black bars)
            window.scaleGameFill = function () {
                fillMode = true;
                scaleGame();
            };

            // Contain mode: gameplay fits within window, preserving aspect ratio
            window.scaleGameContain = function () {
                fillMode = false;
                scaleGame();
            };

            window.addEventListener('resize', scaleGame);
            scaleGame();
            document.addEventListener('DOMContentLoaded', scaleGame);
        })();
    </script>
</body>

</html>
